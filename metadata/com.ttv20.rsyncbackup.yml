Changelog: https://codeberg.org/ttv20/PocketBackup/releases

Name: Pocket Backup
Summary: Backups to your own server with rsync with built-in Tailscale client
Description: |-
  Pocket Backup backs up Android shared storage to a user-controlled server with
  rsync over SSH. with built-in Tailscale client

  The app requests all-files access so it can back up shared storage selected by
  the user. Restore is not included yet.

RepoType: git
Repo: https://codeberg.org/ttv20/PocketBackup.git

Builds:
  - versionName: 1.0-beta
    versionCode: 9
    commit: 24001b131aed7a2aecb8c2858963203d9723ae19
    timeout: 7200
    sudo: |-
      apt-get install -y jq
      mkdir -p /data
      chown vagrant:vagrant /data
    output: app/build/outputs/apk/fdroidRelease/app-fdroidRelease-unsigned.apk
    prebuild: ./scripts/fdroid-scan-source.sh
    scandelete:
      - app/src/sideload
    build: |-
      export ANDROID_HOME=$$SDK$$
      export ANDROID_SDK_ROOT=$$SDK$$
      export ANDROID_NDK_HOME=$$NDK$$
      export ANDROID_NDK_ROOT=$$NDK$$
      export NDK=$$NDK$$
      export POCKETSYNC_VERSION_NAME=$$VERSION$$
      export POCKETSYNC_VERSION_CODE=$$VERCODE$$
      export FDROID_NATIVE_SOURCE_REFS="$(./scripts/fdroid-native-source-refs.sh)"
      ./scripts/build-fdroid-native-termux.sh --termux-mode host
      export GO_ANDROID_IMAGE="host-$(cd native/tsnet-helper && go env GOVERSION)"
      /home/vagrant/gradlew-fdroid/gradlew-fdroid -p . --no-daemon -Ppocketsync.versionName=$$VERSION$$ -Ppocketsync.versionCode=$$VERCODE$$ assembleFdroidRelease
    ndk: 29.0.14206865

MaintainerNotes: |-
  The fdroidRelease build generates native rsync/OpenSSH/zstd assets from the
  pinned Termux package recipes in native/fdroid-native-sources.lock, then
  builds the Android tsnet helper from native/tsnet-helper/go.mod and go.sum.
  app/src/sideload contains upstream sideload-release prebuilts and is removed
  from this build before scanning.

AutoUpdateMode: None
UpdateCheckMode: None
CurrentVersion: 1.0-beta
CurrentVersionCode: 9
