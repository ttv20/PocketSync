name: Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build release APK
    runs-on: ${{ github.server_url == 'https://github.com' && 'ubuntu-latest' || 'codeberg-medium' }}
    env:
      RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      GRADLE_USER_HOME: ${{ github.workspace }}/.gradle-cache

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out source
        run: |
          set -euo pipefail

          git init .
          if git remote get-url origin >/dev/null 2>&1; then
            git remote set-url origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          else
            git remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          fi

          if [[ -n "${GITHUB_REF:-}" ]]; then
            git fetch --depth=1 origin "$GITHUB_REF"
          else
            git fetch --depth=1 origin "$GITHUB_SHA"
          fi

          git checkout --detach FETCH_HEAD

      - name: Validate release tag
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+)*([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0; got '$RELEASE_TAG'" >&2
            exit 1
          fi

          version_name="${RELEASE_TAG#v}"
          echo "POCKETSYNC_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "POCKETSYNC_VERSION_CODE=$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Restore Gradle cache on GitHub
        if: ${{ github.server_url == 'https://github.com' }}
        uses: actions/cache@v4
        with:
          path: |
            .android-sdk
            .gradle-cache/caches
            .gradle-cache/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Restore Gradle cache on Forgejo
        if: ${{ github.server_url != 'https://github.com' }}
        continue-on-error: true
        uses: https://code.forgejo.org/actions/cache@v4
        with:
          path: |
            .android-sdk
            .gradle-cache/caches
            .gradle-cache/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Android build toolchain
        run: |
          set -euo pipefail

          apt_install=()
          for package in ca-certificates curl jq unzip openjdk-21-jdk-headless; do
            if ! dpkg -s "$package" >/dev/null 2>&1; then
              apt_install+=("$package")
            fi
          done

          if (( ${#apt_install[@]} > 0 )); then
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends "${apt_install[@]}"
            else
              apt-get update
              apt-get install -y --no-install-recommends "${apt_install[@]}"
            fi
          fi

          mkdir -p "$ANDROID_HOME/cmdline-tools"
          if [[ ! -x "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]]; then
            sdk_tmp="${RUNNER_TEMP:-/tmp}/android-sdk"
            rm -rf "$sdk_tmp"
            mkdir -p "$sdk_tmp"
            curl -fsSL \
              https://dl.google.com/android/repository/commandlinetools-linux-14742923_latest.zip \
              -o "$sdk_tmp/commandlinetools.zip"
            printf '48833c34b761c10cb20bcd16582129395d121b27  %s\n' \
              "$sdk_tmp/commandlinetools.zip" | sha1sum -c -
            unzip -q "$sdk_tmp/commandlinetools.zip" -d "$sdk_tmp"
            rm -rf "$ANDROID_HOME/cmdline-tools/latest"
            mv "$sdk_tmp/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
          fi

          sdkmanager="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --sdk_root="$ANDROID_HOME" --licenses >/dev/null || true
          "$sdkmanager" --sdk_root="$ANDROID_HOME" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.1.0"

          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          java -version

      - name: Prepare release signing
        env:
          KEYSTORE_B64: ${{ secrets.POCKETSYNC_RELEASE_KEYSTORE_B64 }}
          STORE_PASSWORD: ${{ secrets.POCKETSYNC_RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.POCKETSYNC_RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.POCKETSYNC_RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          for name in KEYSTORE_B64 STORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing release signing secret(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

          mkdir -p build/signing
          printf '%s' "$KEYSTORE_B64" | base64 -d > build/signing/release.jks

          echo "POCKETSYNC_RELEASE_STORE_FILE=build/signing/release.jks" >> "$GITHUB_ENV"
          echo "POCKETSYNC_RELEASE_STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "POCKETSYNC_RELEASE_KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "POCKETSYNC_RELEASE_KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Collect APK artifacts
        run: |
          set -euo pipefail
          mkdir -p dist

          mapfile -t apks < <(find app/build/outputs/apk/release -type f -name '*.apk' | sort)
          if (( ${#apks[@]} == 0 )); then
            echo "No release APKs found under app/build/outputs/apk/release" >&2
            exit 1
          fi

          for apk in "${apks[@]}"; do
            cp "$apk" "dist/PocketBackup-${RELEASE_TAG}-$(basename "$apk")"
          done

          (cd dist && sha256sum *.apk > SHA256SUMS.txt)

      - name: Upload workflow artifact on GitHub
        if: ${{ github.server_url == 'https://github.com' }}
        uses: actions/upload-artifact@v4
        with:
          name: PocketBackup-${{ env.RELEASE_TAG }}-apk
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt

      - name: Upload workflow artifact on Forgejo
        if: ${{ github.server_url != 'https://github.com' }}
        uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: PocketBackup-${{ env.RELEASE_TAG }}-apk
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt

      - name: Publish Codeberg Release
        if: ${{ github.server_url != 'https://github.com' }}
        run: |
          set -euo pipefail

          api_url="${FORGEJO_API_URL:-${GITHUB_API_URL:-$GITHUB_SERVER_URL/api/v1}}"
          repo="${GITHUB_REPOSITORY}"
          token="${FORGEJO_TOKEN:-${GITHUB_TOKEN:-}}"
          if [[ -z "$token" ]]; then
            echo "FORGEJO_TOKEN/GITHUB_TOKEN is not available for release publishing" >&2
            exit 1
          fi
          auth_header="Authorization: Bearer $token"
          release_json="$(mktemp)"

          status="$(
            curl -sS -o "$release_json" -w '%{http_code}' \
              -H "$auth_header" \
              "$api_url/repos/$repo/releases/tags/$RELEASE_TAG"
          )"

          if [[ "$status" == "404" ]]; then
            jq -n \
              --arg tag "$RELEASE_TAG" \
              --arg title "PocketBackup $RELEASE_TAG" \
              --arg target "$GITHUB_SHA" \
              '{
                tag_name: $tag,
                name: $title,
                target_commitish: $target,
                body: "Signed APK and SHA-256 checksums are attached.",
                draft: false,
                prerelease: false
              }' > "$release_json.request"

            curl -fsS -o "$release_json" \
              -H "$auth_header" \
              -H 'Content-Type: application/json' \
              -X POST \
              --data-binary "@$release_json.request" \
              "$api_url/repos/$repo/releases"
          elif [[ "$status" != "200" ]]; then
            cat "$release_json" >&2
            echo "Failed to fetch release $RELEASE_TAG: HTTP $status" >&2
            exit 1
          fi

          release_id="$(jq -r '.id' "$release_json")"
          if [[ -z "$release_id" || "$release_id" == "null" ]]; then
            cat "$release_json" >&2
            echo "Could not determine release ID" >&2
            exit 1
          fi

          assets_json="$(mktemp)"
          curl -fsS -o "$assets_json" \
            -H "$auth_header" \
            "$api_url/repos/$repo/releases/$release_id/assets"

          for file in dist/*.apk dist/SHA256SUMS.txt; do
            name="$(basename "$file")"
            existing_id="$(jq -r --arg name "$name" '.[] | select(.name == $name) | .id' "$assets_json" | head -n1)"
            if [[ -n "$existing_id" && "$existing_id" != "null" ]]; then
              curl -fsS \
                -H "$auth_header" \
                -X DELETE \
                "$api_url/repos/$repo/releases/$release_id/assets/$existing_id"
            fi

            encoded_name="$(jq -nr --arg name "$name" '$name | @uri')"
            curl -fsS \
              -H "$auth_header" \
              -F "attachment=@$file" \
              "$api_url/repos/$repo/releases/$release_id/assets?name=$encoded_name" \
              >/dev/null
          done

      - name: Install GitHub CLI
        if: ${{ github.server_url == 'https://github.com' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Publish GitHub Release
        if: ${{ github.server_url == 'https://github.com' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/*.apk dist/SHA256SUMS.txt --clobber
          else
            gh release create "$RELEASE_TAG" \
              dist/*.apk \
              dist/SHA256SUMS.txt \
              --title "PocketBackup $RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes
          fi
